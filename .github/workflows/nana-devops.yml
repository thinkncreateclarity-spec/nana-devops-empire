name: Nana-Devops Test Matrix

on:
  push:
    paths:
      - 'bin/**'
      - 'nana-devops/**'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run full test matrix
        run: |
          pwd
          ls
          ls bin
          [ -d nana-devops ] && ls nana-devops || echo "nana-devops not present"
          ./bin/run-test-matrix

      - name: Run nana sidecar analyzer
        run: |
          ls reports || echo "no reports dir yet"
          python3 bin/nana-analyze
          ls reports

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: nana-devops-reports
          path: reports/

      - name: Health Status Summary
        run: |
          ./bin/test-decider
