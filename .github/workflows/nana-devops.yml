name: Nana-Devops Test Matrix

on:
  push:
    paths:
      - 'bin/**'
      - 'nana-devops/**'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run timer test
        run: |
          pwd
          ls
          ls bin
          ls nana-devops
          ./bin/run-test timer
