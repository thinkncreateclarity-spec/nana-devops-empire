name: Repo Health

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run architecture + analysis
        run: |
          chmod +x scripts/init-architecture.sh scripts/run-analysis.sh
          scripts/init-architecture.sh
          scripts/run-analysis.sh

      - name: Show repo health summary
        run: |
          chmod +x bin/nana-health-ci
          bin/nana-health-ci

      - name: Enforce risk threshold
        run: |
          # Fail if risk score > 0.5
          score=$(jq -r '.score' reports/risk-latest.json)
          echo "Risk score from analyzer: $score"

          # Compare as float; exit 1 if score > 0.5
          awk -v s="$score" 'BEGIN { exit (s > 0.5 ? 1 : 0) }'
        shell: bash
